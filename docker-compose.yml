services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: as_user
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: userdb
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U as_user -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  user-core-redis:
    image: redis:7
    container_name: user-core-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  web-redis:
    image: redis:7
    container_name: web_redis
    restart: unless-stopped
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOO_MAX_CLIENT_CNXNS: 100
      ZOO_HEAP_SIZE: 1G
    ports:
      - "12181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://host.docker.internal:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: kafdrop
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend

  liquibase:
    image: liquibase/liquibase:4.27.0
    container_name: liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./user-core/src/main/resources/db:/liquibase/db
    command:
      - --changeLogFile=db/changelog/changelog-master.xml
      - --url=jdbc:postgresql://postgres:5432/userdb
      - --username=as_user
      - --password=12345
      - --contexts=dev
      - --log-level=INFO
      - update
    networks:
      - backend

  user-core:
    build:
      context: ./user-core
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8281:8081"
    depends_on:
      postgres:
        condition: service_healthy
      user-core-redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health/liveness && curl -f http://localhost:8081/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userdb
      SPRING_REDIS_HOST: user-core-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_LIQUIBASE_ENABLED: "false"
    networks:
      - backend

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8382:8082"
    depends_on:
      user-core:
        condition: service_healthy
      web-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health/liveness && curl -f http://localhost:8082/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_REDIS_HOST: web-redis
      USER_SERVICE_URL: http://user-core:8081
    networks:
      - backend

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8483:8083"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health/liveness && curl -f http://localhost:8083/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
    networks:
      - backend

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - backend

volumes:
  pgdata:
  kafka_data:

networks:
  backend:
    driver: bridge