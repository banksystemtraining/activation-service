server.port=8081
spring.application.name=user-core

# Kafka producer
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.topic.activation=activation-topic
spring.kafka.topic.register=user-registration

# Feign clients
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
feign.client.config.default.logger-level=basic
feign.client.user-core.url=http://user-core:8081
feign.client.web.url=http://web:8082
feign.client.notification-service.url=http://notification-service:8083

# PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:5432/userdb
spring.datasource.username=as_user
spring.datasource.password=12345

# Redis
spring.redis.host=user-core-redis
spring.redis.port=6379
spring.redis.timeout=5000
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=4

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoints.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.itgirl.usercore=DEBUG
