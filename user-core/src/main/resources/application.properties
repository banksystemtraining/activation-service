server.port=8081
spring.application.name=user-core

# Kafka producer
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.topic.activation=activation-topic
spring.kafka.topic.register=user-registration

# PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:5432/userdb
spring.datasource.username=as_user
spring.datasource.password=12345

# Redis
spring.redis.host=user-core-redis
spring.redis.port=6379
spring.redis.timeout=5000
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=4

#Liquibase
spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.event.merge.entity_copy_observer=allow

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoints.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.kafka.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true
management.endpoint.health.status.order=DOWN,OUT_OF_SERVICE,UP

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.itgirl.usercore=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=TRACE
logging.level.org.hibernate.engine.transaction.internal=DEBUG
logging.level.org.springframework.data.redis=DEBUG