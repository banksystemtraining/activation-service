server.port=8081
spring.application.name=user-core

user-core.base-url=http://user-core:8081
web.base-url=http://web:8082
notification-service.base-url=http://notification-service:8083

feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
feign.client.config.default.logger-level=basic
feign.client.user-core.url=http://user-core:8081
feign.client.web.url=http://web:8082
feign.client.notification-service.url=http://notification-service:8083

spring.datasource.url=jdbc:postgresql://localhost:5432/userdb
spring.datasource.username=as_user
spring.datasource.password=12345
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.redis.host=user-core-redis
spring.redis.port=6379
spring.redis.timeout=5000
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=4

management.endpoints.web.exposure.include=health,info
management.endpoints.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.itgirl.usercore=DEBUG