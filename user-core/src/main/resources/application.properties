server.port=8081
spring.application.name=user-core

spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.topic.register=user-registration-topic
spring.kafka.topic.activation=user-registration-topic

spring.datasource.url=jdbc:postgresql://localhost:15432/userdb
spring.datasource.username=as_user
spring.datasource.password=12345

spring.redis.host=user-core-redis
spring.redis.port=6379
spring.redis.timeout=5000
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=4

spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

management.endpoints.web.exposure.include=health,info
management.endpoints.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.kafka.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true
management.endpoint.health.status.order=DOWN,OUT_OF_SERVICE,UP

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.itgirl.usercore=DEBUG