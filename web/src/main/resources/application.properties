server.port=8082
spring.application.name=web

user-core.base-url=http://user-core:8081
web.base-url=http://web:8082
notification-service.base-url=http://notification-service:8083

feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
feign.client.config.default.logger-level=basic
feign.client.user-core.url=http://user-core:8081
feign.client.web.url=http://web:8082
feign.client.notification-service.url=http://notification-service:8083

spring.redis.host=web-redis
spring.redis.port=6379
spring.redis.timeout=5000
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=4



management.endpoints.web.exposure.include=health,info
management.endpoints.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.itgirl.web=DEBUG
logging.level.com.itgirl.usercore.client.UserCoreClient=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG

spring.mvc.throw-exception-if-no-handler-found=true
server.error.include-message=always
spring.web.resources.add-mappings=false